<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <meta name="theme-color" content="#3B82F6" />
    
    <!-- ============================================ -->
    <!-- PRIMARY META TAGS                             -->
    <!-- ============================================ -->
    <title>Kajiado Bright Horizons | Hope & Care for Vulnerable Children</title>
    <meta name="description" content="Kajiado Bright Horizons provides shelter, education, healthcare, and love to orphaned and vulnerable children in Kajiado, Kenya since 1997." />
    <meta name="robots" content="index, follow" />

    <!-- ============================================ -->
    <!-- CANONICAL URL                                -->
    <!-- ============================================ -->
    <link rel="canonical" href="https://kajiado-bright-horizons.vercel.app" />
    
    <!-- ============================================ -->
    <!-- OPEN GRAPH                                   -->
    <!-- ============================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kajiado-bright-horizons.vercel.app" />
    <meta property="og:title" content="Kajiado Bright Horizons - Hope & Care for Vulnerable Children" />
    <meta property="og:description" content="Providing shelter, education, healthcare, and love to orphaned and vulnerable children in Kajiado, Kenya since 1997." />
    <meta property="og:image" content="https://kajiado-bright-horizons.vercel.app/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- ============================================ -->
    <!-- FAVICON                                      -->
    <!-- ============================================ -->
    <link rel="icon" type="image/png" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- ============================================ -->
    <!-- PRECONNECT - Critical                        -->
    <!-- ============================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    
    <!-- ============================================ -->
    <!-- PRELOAD - Only FIRST hero image             -->
    <!-- ============================================ -->
    <link rel="preload" as="image" href="/images/hero/hero-bg.jpg" />
    
    <!-- ============================================ -->
    <!-- FONTS - Load asynchronously                  -->
    <!-- ============================================ -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    </noscript>
    
    <!-- ============================================ -->
    <!-- FONT AWESOME - Load asynchronously           -->
    <!-- ============================================ -->
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    </noscript>

    <!-- ============================================ -->
    <!-- CRITICAL CSS - Inlined                      -->
    <!-- ============================================ -->
    <style>
      /* Critical CSS for above-the-fold */
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Inter',sans-serif;background:#f0f4f8;-webkit-font-smoothing:antialiased}
      #root{min-height:100vh}
      
      /* Hero slider critical styles */
      .hero-slider{position:relative;width:100%;height:70vh;min-height:500px;max-height:700px;overflow:hidden}
      .hero-slide{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;transition:opacity 1s ease-in-out;z-index:1}
      .hero-slide.active{opacity:1;z-index:2}
      .hero-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:1}
      .hero-content-wrapper{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;height:100%;padding:0 20px}
      .hero-text{max-width:800px;margin:0 auto;text-align:center;color:#fff}
      .hero-title{font-size:2.8rem;font-weight:800;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,0,0,0.3)}
      .hero-subtitle{font-size:1.3rem;margin-bottom:12px;opacity:.95}
      .hero-description{font-size:1rem;opacity:.85;max-width:600px;margin:0 auto 24px;line-height:1.6}
      
      @media(max-width:768px){.hero-slider{height:60vh;min-height:400px}.hero-title{font-size:2rem}.hero-subtitle{font-size:1.1rem}}
      @media(max-width:480px){.hero-slider{height:50vh;min-height:350px}.hero-title{font-size:1.6rem}}
      
      /* Image placeholder */
      .image-placeholder{background:linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
      @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
      
      /* OptimizedImage wrapper */
      .optimized-image-wrapper{position:relative;overflow:hidden;background:#f0f4f8}
      
      /* Hero dots - optimized */
      .hero-dots{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
      .hero-dot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,0.5);background:transparent;cursor:pointer;transition:all 0.3s ease;padding:0}
      .hero-dot.active{background:#fff;border-color:#fff;transform:scale(1.2)}
      .hero-dot:hover{background:rgba(255,255,255,0.3)}
      
      .hero-bg-image-wrapper{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
      .hero-bg-image-wrapper .optimized-image-wrapper{width:100%!important;height:100%!important}
      .hero-bg-image-wrapper img{width:100%;height:100%;object-fit:cover;object-position:center}
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding:20px;text-align:center;font-family:Arial,sans-serif;max-width:600px;margin:0 auto;">
        <h1 style="color:#2563eb;">Kajiado Bright Horizons</h1>
        <p>Please enable JavaScript to support our mission.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
