<!DOCTYPE html>
<html>
<head>
    <title>Test Pesapal Payment</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 500px; margin: 0 auto; }
        button { padding: 10px 20px; margin: 10px 0; background: #3B82F6; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #2563EB; }
        pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow: auto; }
        input { width: 100%; padding: 8px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 4px; }
        label { font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>🧪 Test Pesapal Payment</h1>
    
    <div>
        <label>Amount (KES):</label>
        <input type="number" id="amount" value="1000">
        
        <label>Phone Number:</label>
        <input type="text" id="phone" value="712345678">
        
        <label>Email:</label>
        <input type="email" id="email" value="test@example.com">
        
        <label>Full Name:</label>
        <input type="text" id="name" value="Test Donor">
    </div>
    
    <button onclick="testPayment()">💳 Pay via Pesapal</button>
    
    <h3>Response:</h3>
    <pre id="result">Click the button to test...</pre>

    <script>
        async function testPayment() {
            const result = document.getElementById('result');
            result.textContent = '⏳ Processing payment...';
            
            const paymentData = {
                amount: parseInt(document.getElementById('amount').value) || 1000,
                phoneNumber: document.getElementById('phone').value || '712345678',
                email: document.getElementById('email').value || 'test@example.com',
                fullName: document.getElementById('name').value || 'Test Donor',
                donationType: 'one-time',
                paymentMethod: 'mpesa'
            };
            
            try {
                const response = await fetch('/api/pesapal-payment', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(paymentData)
                });
                
                const data = await response.json();
                result.textContent = JSON.stringify(data, null, 2);
                
                if (data.success && data.paymentUrl) {
                    result.textContent += '\n\n✅ Redirecting to Pesapal...';
                    result.className = 'success';
                    // Redirect to Pesapal after 2 seconds
                    setTimeout(() => {
                        window.location.href = data.paymentUrl;
                    }, 2000);
                } else {
                    result.className = 'error';
                }
            } catch (error) {
                result.textContent = '❌ Error: ' + error.message;
                result.className = 'error';
            }
        }
    </script>
</body>
</html>
